<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Sonic Sesh{% endblock %}</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 900px; margin: 0 auto; padding: 1.5rem; }
    h1 { margin-top: 0; }
    h2 { margin-top: 2rem; border-bottom: 1px solid #ddd; padding-bottom: 0.25rem; }
    .caption { color: #666; margin-bottom: 1.5rem; }
    .flash { padding: 0.75rem 1rem; border-radius: 6px; margin-bottom: 1rem; }
    .flash.success { background: #d4edda; color: #155724; }
    .flash.error { background: #f8d7da; color: #721c24; }
    .flash.warning { background: #fff3cd; color: #856404; }
    form section { margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.25rem; font-weight: 500; }
    input[type="text"], input[type="number"], textarea, select { width: 100%; max-width: 400px; padding: 0.5rem; }
    textarea { min-height: 80px; }
    button, .btn { display: inline-block; padding: 0.5rem 1rem; background: #0d6efd; color: #fff; border: none; border-radius: 6px; cursor: pointer; text-decoration: none; font-size: 1rem; }
    button:hover, .btn:hover { background: #0b5ed7; color: #fff; }
    .btn.secondary { background: #6c757d; }
    .btn.secondary:hover { background: #5c636a; }
    table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
    th, td { text-align: left; padding: 0.5rem; border-bottom: 1px solid #eee; }
    th { font-weight: 600; }
    .sidebar { background: #f5f5f5; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; }
    .checkbox-list { max-height: 220px; overflow-y: auto; border: 1px solid #ddd; padding: 0.5rem; border-radius: 6px; }
    .checkbox-list label { display: flex; align-items: center; gap: 0.5rem; font-weight: normal; margin-bottom: 0.25rem; }
    input[type="checkbox"] { width: auto; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  {% block body %}
  {% endblock %}
</body>
</html>
